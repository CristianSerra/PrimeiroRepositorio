name: Validar e Publicar um Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar validadores
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Validar HTML
        run: htmlhint "**/*.html"

      - name: Criar configuração do Stylelint
        run: |
          echo '{
            "extends": "stylelint-config-standard"
          }' > .stylelintrc.json

      - name: Validar CSS
        run: stylelint "**/*.css"

      - name: Upload dos arquivos para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: validar
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
